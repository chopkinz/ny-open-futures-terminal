# NY Open Futures Terminal - Default Configuration
# All times in America/New_York unless noted.

app:
  title: "NY Open Futures Terminal"
  page_icon: "📊"
  layout: "wide"
  timezone_display: "America/New_York"

data:
  default_source: "yahoo"
  default_symbol: "MNQ=F"
  default_interval: "5m"
  default_lookback_days: 90
  cache_dir: "data/cache"
  supported_intervals:
    - "1m"
    - "2m"
    - "5m"
    - "15m"
    - "30m"
    - "60m"

sessions:
  timezone: "America/Chicago"   # CST; opening range 8:00–9:15 AM CST
  overnight_start: "18:00"   # prior day
  overnight_end: "04:00"
  premarket_start: "04:00"
  premarket_end: "09:29"
  ny_open: "09:30"
  study_window_end: "12:00"
  default_or_start: "08:00"
  default_or_end: "09:15"
  trade_window_end: "12:00"

strategy:
  default_mode: "orb"
  entry_modes:
    - "touch"
    - "close_beyond"
    - "breakout_retest"
  stop_modes:
    - "opposite_or_side"
    - "fixed_or_multiple"
    - "atr_based"
    - "fixed_points"
  target_modes:
    - "fixed_r"
    - "opposite_side"
    - "session_close"
    - "trailing_placeholder"
  default_slippage_ticks: 0
  default_fee_per_side: 0
  one_trade_per_day: true
  direction_filter: "both"  # long, short, both
  max_wait_minutes: 120     # cancel if no fill by this many minutes after OR end

backtest:
  default_r_multiple: 1.0
  default_buffer_ticks: 0
  default_stop_or_multiple: 1.0

contracts:
  ES:
    point_value: 50
    tick_size: 0.25
    tick_value: 12.50
  MES:
    point_value: 5
    tick_size: 0.25
    tick_value: 1.25
  NQ:
    point_value: 20
    tick_size: 0.25
    tick_value: 5.00
  MNQ:
    point_value: 2
    tick_size: 0.25
    tick_value: 0.50
